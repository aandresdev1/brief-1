<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brief de proyecto — Crearperu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0805;
    --surface: rgba(20,15,8,0.55);
    --surface-alt: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #ECECF1;
    --text-muted: rgba(236,236,241,0.62);
    --accent: #F2A33C;
    --accent-text: #1A1206;
    --accent-soft: rgba(242,163,60,0.14);
    --accent-2: #F2A33C;
    --accent-2-soft: rgba(242,163,60,0.14);
    --radius: 16px;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 12px 28px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px 80px;
  }

  .app {
    width: 100%;
    max-width: 640px;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .brand-mark {
    width: 38px; height: 38px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 1.5px solid var(--border);
  }
  .brand-name {
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.01em;
    color: var(--text);
  }

  .rail {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .rail-step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }
  .rail-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    transition: all 0.25s ease;
  }
  .rail-step.active .rail-dot {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
  }
  .rail-step.active { color: var(--text); }
  .rail-line {
    flex: 1;
    height: 1.5px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .rail-line-fill {
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }
  .rail-line.filled .rail-line-fill { transform: scaleX(1); }

  h1 {
    font-family: 'Sora', sans-serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 14.5px;
    margin: 0 0 28px;
    line-height: 1.5;
  }

  /* --- Step 1: type selector --- */
  .type-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .type-card {
    position: relative;
    text-align: left;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px 16px;
    cursor: pointer;
    transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    font-family: inherit;
    color: var(--text);
    overflow: hidden;
  }
  .type-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent-color, var(--accent));
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .type-card:hover:not(.disabled) {
    border-color: var(--accent-color, var(--accent));
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .type-card:hover:not(.disabled)::before { opacity: 1; }
  .type-card.disabled {
    cursor: default;
    color: var(--text-muted);
  }
  .type-card.disabled .type-icon { opacity: 0.35; }
  .type-icon {
    width: 30px; height: 30px;
    margin-bottom: 10px;
    color: var(--accent-color, var(--accent));
  }
  .type-icon svg { width: 100%; height: 100%; }
  .type-label {
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 3px;
  }
  .type-hint {
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .badge-soon {
    position: absolute;
    top: 12px; right: 12px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    background: var(--surface-alt);
    color: var(--text-muted);
    padding: 3px 7px;
    border-radius: 20px;
  }

  /* --- Step 2: form --- */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    padding: 0;
    margin-bottom: 16px;
  }
  .back-link:hover { color: var(--text); }

  .selected-type-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12.5px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 18px;
  }

  .field {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 18px 20px;
    margin-bottom: 12px;
  }
  .field-label {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .field-hint {
    font-size: 12.5px;
    color: var(--text-muted);
    margin-top: -8px;
    margin-bottom: 12px;
  }

  .pill-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: 20px;
    padding: 7px 13px 7px 10px;
    font-size: 13.5px;
    cursor: pointer;
    user-select: none;
    transition: all 0.12s ease;
  }
  .pill:hover { border-color: var(--accent); }
  .pill.checked {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .pill-check {
    width: 15px; height: 15px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s ease;
  }
  .pill.checked .pill-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .pill-check svg { width: 9px; height: 9px; opacity: 0; transition: opacity 0.1s; }
  .pill.checked .pill-check svg { opacity: 1; }
  .pill.custom-added .pill-remove {
    margin-left: 2px;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1;
  }

  .add-other-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .add-other-row input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    font-family: inherit;
    font-size: 13.5px;
    background: var(--surface-alt);
  }
  .add-other-row input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
  }
  .add-other-row button {
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: 10px;
    padding: 0 14px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
  }
  .add-other-row button:hover { border-color: var(--accent); color: var(--accent); }

  .toggle-group {
    display: inline-flex;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .toggle-opt {
    padding: 8px 20px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    background: var(--surface);
    color: var(--text-muted);
    border: none;
    font-family: inherit;
    border-right: 1.5px solid var(--border);
  }
  .toggle-opt:last-child { border-right: none; }
  .toggle-opt.active {
    background: var(--accent);
    color: white;
  }

  select.select-input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 13.5px;
    background: var(--surface-alt) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="%23ECECF1" opacity="0.6"><path d="M5.5 7.5l4.5 4.5 4.5-4.5" stroke="%23ECECF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/></svg>') no-repeat right 12px center;
    appearance: none;
    color: var(--text);
    cursor: pointer;
  }
  select.select-input:focus { outline: none; border-color: var(--accent); background-color: var(--surface); }

  textarea.text-input {
    width: 100%;
    min-height: 90px;
    padding: 11px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 13.5px;
    background: var(--surface-alt);
    resize: vertical;
    color: var(--text);
  }
  textarea.text-input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  textarea.text-input::placeholder { color: #A6A59C; }

  .submit-error {
    background: rgba(239,68,68,0.12);
    border: 1.5px solid rgba(239,68,68,0.35);
    color: #FCA5A5;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 10px;
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .submit-btn:disabled {
    opacity: 0.65;
    cursor: not-allowed;
  }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(26,18,6,0.3);
    border-top-color: #1A1206;
    border-radius: 50%;
    vertical-align: -2px;
    margin-right: 4px;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .submit-btn {
    width: 100%;
    padding: 15px;
    margin-top: 8px;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 11px;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .submit-btn:hover { background: #FFB35C; }
  .submit-btn:active { transform: scale(0.99); }

  /* --- confirmation --- */
  .confirm {
    text-align: center;
    padding: 40px 20px;
  }
  .confirm-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent-2-soft);
    color: var(--accent-2);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .confirm h2 {
    font-family: 'Sora', sans-serif;
    font-size: 20px;
    margin: 0 0 8px;
  }
  .confirm p {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0 0 24px;
    line-height: 1.5;
  }

  .step { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .type-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  app: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="6" y="2" width="12" height="20" rx="2.5"/><path d="M10 18h4" stroke-linecap="round"/></svg>',
  webapp: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="12" rx="2"/><path d="M8 21h8M12 17v4" stroke-linecap="round"/></svg>'
};

const PROJECT_TYPES = {
  landing: {
    label: "Landing Page",
    hint: "Una sola página enfocada en conversión",
    color: "#F2A33C",
    available: true,
    pageQuestion: "¿Qué secciones necesitas?",
    pageOptions: ["Hero / Portada","Sobre nosotros","Servicios","Testimonios","Preguntas frecuentes","Formulario de contacto","Ubicación / Mapa"]
  },
  website: {
    label: "Sitio Web",
    hint: "Varias páginas, presencia institucional",
    color: "#F2A33C",
    available: true,
    pageQuestion: "¿Qué páginas necesitas?",
    pageOptions: ["Inicio","Nosotros","Servicios","Equipo","Blog / Noticias","Preguntas frecuentes","Contacto"]
  },
  ecommerce: { label: "E-commerce", hint: "Venta de productos en línea", color: "#F2A33C", available: false },
  app: { label: "App Móvil", hint: "iOS, Android o ambos", color: "#F2A33C", available: false },
  webapp: { label: "Web App", hint: "Sistema o herramienta a medida", color: "#F2A33C", available: false }
};

// Q2–Q9: shared across all available types today
// Orden pensado para seguir el flujo natural de la conversación con el cliente:
// 1) qué trae el cliente (diseño) → 2) preferencia técnica → 3) infraestructura (dominio/hosting)
// → 4) requisitos funcionales → 5) legal/cumplimiento → 6) soporte post-entrega → 7) notas abiertas al final
const COMMON_QUESTIONS = [
  { id: "disenos", type: "toggle", label: "¿Tienes el diseño de la(s) página(s)?", options: ["Sí","No"] },
  { id: "tecnologia", type: "select", label: "¿Has pensado en alguna tecnología?",
    options: ["Webflow","WordPress","Desarrollo a medida","No lo he pensado"] },
  { id: "dominio", type: "toggle", label: "¿Cuentas con dominio?", options: ["Sí","No"] },
  { id: "hosting", type: "toggle", label: "¿Cuentas con hosting?", options: ["Sí","No"] },
  { id: "administrable", type: "toggle", label: "¿Será administrable?", options: ["Sí","No"] },
  { id: "idiomas", type: "toggle", label: "¿Necesitas que esté en más de un idioma?", options: ["Sí","No"] },
  { id: "libro_reclamaciones", type: "toggle", label: "¿Necesitas Libro de Reclamaciones?", options: ["Sí","No"] },
  { id: "terminos_condiciones", type: "toggle", label: "¿Necesitas Términos y Condiciones?", options: ["Sí","No"] },
  { id: "despliegue", type: "toggle", label: "¿Necesitas ayuda con el despliegue del proyecto al finalizar?", options: ["Sí","No"] },
  { id: "especificaciones", type: "textarea", label: "Detalla más especificaciones que consideras importantes",
    placeholder: "Cuéntame cualquier detalle adicional que deba saber…" }
];

// ---------- State ----------
// El link real luce así: tu-dominio.com/brief?id=<page_id_de_notion>
// Andrés crea la fila en "Proyectos" (Nombre + Cliente) antes de enviar el link;
// el tipo de proyecto SÍ lo elige el cliente aquí en el formulario (paso 1).
const N8N_WEBHOOK_URL = "https://primary-production-b62f1.up.railway.app/webhook/brief-submit";

const urlParams = new URLSearchParams(window.location.search);
let state = { type: null, pages: [], answers: {}, pageId: urlParams.get('id') || null, submitting: false, submitError: null };

const content = document.getElementById('content');

function render() {
  if (!state.pageId) return renderNoId();
  if (!state.type) return renderStep1();
  if (!state.submitted) return renderStep2();
  return renderConfirm();
}

function renderNoId() {
  setRail(0);
  content.innerHTML = `
    <div class="step confirm">
      <div class="confirm-icon" style="background: rgba(239,68,68,0.12); color: #DC2626;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2>Este link no es válido</h2>
      <p>Por favor solicita un nuevo link a quien te lo compartió.</p>
    </div>
  `;
}

function setRail(step) {
  document.getElementById('railStep1').classList.toggle('active', step >= 1);
  document.getElementById('railStep2').classList.toggle('active', step >= 2);
  document.getElementById('railLine').classList.toggle('filled', step >= 2);
}

// ---------- Step 1 ----------
function renderStep1() {
  setRail(1);
  const cards = Object.entries(PROJECT_TYPES).map(([key, t]) => `
    <button class="type-card ${t.available ? '' : 'disabled'}" style="--accent-color:${t.color}" data-type="${key}" ${t.available ? '' : 'disabled'}>
      ${!t.available ? '<span class="badge-soon">Próximamente</span>' : ''}
      <div class="type-icon">${ICONS[key]}</div>
      <div class="type-label">${t.label}</div>
      <div class="type-hint">${t.hint}</div>
    </button>
  `).join('');

  content.innerHTML = `
    <div class="step">
      <h1>Cuéntanos sobre tu proyecto</h1>
      <p class="subtitle">Elige el tipo de proyecto que necesitas. Según tu selección, te haremos las preguntas correctas.</p>
      <div class="type-grid">${cards}</div>
    </div>
  `;

  content.querySelectorAll('.type-card:not(.disabled)').forEach(btn => {
    btn.addEventListener('click', () => {
      state.type = btn.dataset.type;
      state.pages = [];
      state.answers = {};
      render();
    });
  });
}

// ---------- Step 2 ----------
function renderStep2() {
  setRail(2);
  const t = PROJECT_TYPES[state.type];

  content.innerHTML = `
    <div class="step">
      <button class="back-link" id="backBtn">← Cambiar tipo de proyecto</button><br>
      <div class="selected-type-pill">${ICONS[state.type].includes('<svg') ? '' : ''}${t.label}</div>
      <h1>Detalles de tu ${t.label.toLowerCase()}</h1>
      <p class="subtitle">Marca las opciones que apliquen. Si algo no está en la lista, puedes agregarlo.</p>

      <div class="field">
        <div class="field-label">${t.pageQuestion}</div>
        <div class="pill-grid" id="pageOptionsGrid"></div>
        <div class="add-other-row">
          <input type="text" id="customPageInput" placeholder="Agregar otra que no esté en la lista…">
          <button id="addPageBtn" type="button">+ Agregar</button>
        </div>
      </div>

      <div id="commonQuestions"></div>

      ${state.submitError ? `<div class="submit-error">${state.submitError}</div>` : ''}
      <button class="submit-btn" id="submitBtn" ${state.submitting ? 'disabled' : ''}>${state.submitting ? '<span class="spinner"></span> Enviando…' : 'Enviar brief'}</button>
    </div>
  `;

  document.getElementById('backBtn').addEventListener('click', () => {
    state.type = null;
    render();
  });

  renderPagePills(t);

  document.getElementById('addPageBtn').addEventListener('click', addCustomPage);
  document.getElementById('customPageInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addCustomPage(); }
  });

  renderCommonQuestions();

  document.getElementById('submitBtn').addEventListener('click', handleSubmit);
}

function renderPagePills(t) {
  const grid = document.getElementById('pageOptionsGrid');
  const allOptions = [...t.pageOptions, ...state.pages.filter(p => !t.pageOptions.includes(p))];
  grid.innerHTML = allOptions.map(opt => {
    const checked = state.pages.includes(opt);
    const isCustom = !t.pageOptions.includes(opt);
    return `
      <div class="pill ${checked ? 'checked' : ''} ${isCustom ? 'custom-added' : ''}" data-opt="${opt.replace(/"/g,'&quot;')}">
        <span class="pill-check"><svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><path d="M2 6l3 3 5-6"/></svg></span>
        <span>${opt}</span>
        ${isCustom ? '<span class="pill-remove">✕</span>' : ''}
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', (e) => {
      const opt = pill.dataset.opt;
      const removeClicked = e.target.classList.contains('pill-remove');
      if (removeClicked) {
        state.pages = state.pages.filter(p => p !== opt);
      } else if (state.pages.includes(opt)) {
        state.pages = state.pages.filter(p => p !== opt);
      } else {
        state.pages.push(opt);
      }
      renderPagePills(t);
    });
  });
}

function addCustomPage() {
  const input = document.getElementById('customPageInput');
  const val = input.value.trim();
  if (!val) return;
  if (!state.pages.includes(val)) state.pages.push(val);
  input.value = "";
  renderPagePills(PROJECT_TYPES[state.type]);
}

function renderCommonQuestions() {
  const container = document.getElementById('commonQuestions');
  container.innerHTML = COMMON_QUESTIONS.map(q => {
    if (q.type === 'toggle') {
      return `
        <div class="field">
          <div class="field-label">${q.label}</div>
          <div class="toggle-group" data-qid="${q.id}">
            ${q.options.map(o => `<button type="button" class="toggle-opt ${state.answers[q.id] === o ? 'active' : ''}" data-val="${o}">${o}</button>`).join('')}
          </div>
        </div>
      `;
    }
    if (q.type === 'select') {
      return `
        <div class="field">
          <div class="field-label">${q.label}</div>
          <select class="select-input" data-qid="${q.id}">
            <option value="" disabled ${!state.answers[q.id] ? 'selected' : ''}>Selecciona una opción</option>
            ${q.options.map(o => `<option value="${o}" ${state.answers[q.id] === o ? 'selected' : ''}>${o}</option>`).join('')}
          </select>
        </div>
      `;
    }
    if (q.type === 'textarea') {
      return `
        <div class="field">
          <div class="field-label">${q.label}</div>
          <textarea class="text-input" data-qid="${q.id}" placeholder="${q.placeholder || ''}">${state.answers[q.id] || ''}</textarea>
        </div>
      `;
    }
    return '';
  }).join('');

  container.querySelectorAll('.toggle-group').forEach(group => {
    group.querySelectorAll('.toggle-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        state.answers[group.dataset.qid] = btn.dataset.val;
        renderCommonQuestions();
      });
    });
  });
  container.querySelectorAll('select.select-input').forEach(sel => {
    sel.addEventListener('change', () => { state.answers[sel.dataset.qid] = sel.value; });
  });
  container.querySelectorAll('textarea.text-input').forEach(ta => {
    ta.addEventListener('input', () => { state.answers[ta.dataset.qid] = ta.value; });
  });
}

// ---------- Submit / confirm ----------
function buildPayload() {
  const t = PROJECT_TYPES[state.type];
  return {
    page_id: state.pageId,
    tipo_proyecto: t.label,
    paginas_secciones_pregunta: t.pageQuestion,
    paginas_secciones: state.pages,
    respuestas: COMMON_QUESTIONS.reduce((acc, q) => {
      acc[q.label] = state.answers[q.id] || null;
      return acc;
    }, {})
  };
}

async function handleSubmit() {
  state.submitting = true;
  state.submitError = null;
  renderStep2();

  const payload = buildPayload();

  try {
    const res = await fetch(N8N_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('El servidor respondió con un error (' + res.status + ')');
    state.submitting = false;
    state.submitted = true;
    render();
  } catch (err) {
    state.submitting = false;
    state.submitError = 'No se pudo enviar el brief. Revisa tu conexión e intenta de nuevo. (' + err.message + ')';
    renderStep2();
  }
}

function renderConfirm() {
  setRail(2);

  content.innerHTML = `
    <div class="step confirm">
      <div class="confirm-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2>¡Brief enviado con éxito!</h2>
      <p>Gracias por completar el brief. Nos pondremos en contacto contigo muy pronto para conversar sobre tu proyecto.</p>
    </div>
  `;
}

render();
</script>
</body>
</html>
